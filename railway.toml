[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "vhm24r-backend"
source = "backend"

[services.variables]
PORT = "8000"
PYTHONPATH = "/app"
ENVIRONMENT = "production"
DEBUG = "False"

[[services]]
name = "vhm24r-frontend"
source = "frontend"

[services.variables]
NODE_ENV = "production"
